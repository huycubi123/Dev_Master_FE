<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // in ra tam giác các số 0 , 01 , 012 , 0123 , 01234 ... 0123456789, ngược lại, sang trái, sang phải 
        for (var i = 0; i <= 9; i++) {
            var line = "";
            for (var j = 0; j <= i; j++) {
                line += j;
            }
            document.write(line + "<br>");
        }
    
    </script>
</body>
</html>
