<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Máy tính đơn giản</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      #box {
        width: 400px;
        height: auto;
        padding: 20px;
        border: 2px solid rgb(150, 250, 0);
        border-radius: 5px;
        margin: 20px auto;
      }
      h1 {
        text-align: center;
        color: rgb(1, 9, 15);
        margin-bottom: 15px;
      }
      input[type="number"],
      input[type="text"] {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        border: 1px solid rgb(150, 250, 0);
        border-radius: 10px;
        box-sizing: border-box;
      }
      .checkbox {
        margin: 15px 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .btn-toan-tu {
        width: 60px;
        height: 40px;
        background-color: rgb(37, 192, 37);
        color: yellow;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 1.2rem;
      }
      .btn-toan-tu:hover {
        background-color: rgb(30, 160, 30);
      }
    </style>
  </head>
  <body>
    <div id="box">
      <h1>Thực hiện các phép toán</h1>
      <form action="">
        <div>
          <input type="number" id="a" placeholder="Số a" />
        </div>
        <div>
          <input type="number" id="b" placeholder="Số b" />
        </div>
        <div class="checkbox">
          <div class="btn-toan-tu" onclick="calc('+')">+</div>
          <div class="btn-toan-tu" onclick="calc('-')">-</div>
          <div class="btn-toan-tu" onclick="calc('*')">*</div>
          <div class="btn-toan-tu" onclick="calc('/')">/</div>
          <div class="btn-toan-tu" onclick="calc('%')">%</div>
        </div>
        <div>
          <input type="text" id="result" placeholder="Kết quả" readonly />
        </div>
      </form>
    </div>

    <script>
      function calc(operator) {
        var a = parseFloat(document.getElementById("a").value);
        var b = parseFloat(document.getElementById("b").value);
        var resultField = document.getElementById("result");

        if (isNaN(a) || isNaN(b)) {
          resultField.value = "Vui lòng nhập đủ 2 số";
          return;
        }

        var res;
        switch (operator) {
          case "+":
            res = a + b;
            break;
          case "-":
            res = a - b;
            break;
          case "*":
            res = a * b;
            break;
          case "/":
            res = b !== 0 ? a / b : "Không thể chia cho 0";
            break;
          case "%":
            res = b !== 0 ? a % b : "Không thể chia cho 0";
            break;
          default:
            res = "";
        }
        resultField.value = res;
      }
    </script>
  </body>
</html>
