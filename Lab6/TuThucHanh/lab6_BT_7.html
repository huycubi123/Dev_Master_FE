<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .card {
            border: 2px solid #4CAF50;
            border-radius: 15px;
            padding: 20px;
            background-color: white;
            width: 450px;
        }
        h2 {
            color: #008000;
            text-align: center;
            margin-top: 0;
        }
        hr {
            border: none;
            border-top: 2px solid #008000;
            margin-bottom: 20px;
        }
        .content {
            text-align: center;
            white-space: pre;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Tháp ký tự 10 dòng</h2>
        <hr>
        <div class="content" id="tamGiac"></div>
    </div>

    <script>
        const container = document.getElementById('tamGiac');
        const rows = 10;
        let result = "";

        for (let i = 0; i < rows; i++) {
            let rowChars = "";

            // Phần tăng dần: A, B, C...
            // Mã ASCII của 'A' là 65
            for (let j = 0; j <= i; j++) {
                rowChars += String.fromCharCode(65 + j) + " ";
            }

            // Phần giảm dần: ...C, B, A
            for (let j = i - 1; j >= 0; j--) {
                rowChars += String.fromCharCode(65 + j) + " ";
            }

            result += rowChars.trim() + "\n";
        }

        container.innerText = result;
    </script>

</body>
</html>
