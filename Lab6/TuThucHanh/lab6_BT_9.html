<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      .container {
        border: 2px solid #4caf50;
        border-radius: 15px;
        padding: 25px;
        max-width: 900px;
        margin: 0 auto;
      }
      h2 {
        color: #2e7d32;
        font-size: 18px;
        margin-bottom: 15px;
        margin-top: 0;
      }
      .row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 30px;
        padding-bottom: 15px;
        border-bottom: 2px solid #4caf50;
      }
      .row:last-child {
        border-bottom: none;
        margin-bottom: 0;
      }

      .box {
        padding: 6px 15px;
        border: 2px solid #4caf50;
        border-radius: 10px;
        color: #c62828; 
        font-weight: bold;
        background-color: #fff;
      }
      .text-info {
        color: #2e7d32;
        font-weight: bold;
        margin: 0 5px;
      }
      .counter-box {
        padding: 5px 12px;
        border: 2px solid #4caf50;
        border-radius: 8px;
        color: #c62828;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Mảng các xâu:</h2>
      <div id="original-strings" class="row"></div>

      <h2>Các xâu có ít nhất 3 từ trong mảng:</h2>
      <div id="filtered-strings" class="row"></div>

      <h2>Mảng sau khi sắp xếp theo alphabet:</h2>
      <div id="sorted-strings" class="row"></div>
    </div>

    <script>
      /// 1. Khởi tạo mảng các xâu (Lấy dữ liệu theo mẫu trong ảnh)
      const stringArray = [
        "OG mFkPq",
        "JT vJO",
        "UAfDQ GqVaE gK",
        "GFB tBZf",
        "NP mJIa ZL1",
        "rQx XOCO",
        "KmsXN ApJHY sY",
        "aCjl QU",
        "Ys OJBM",
        "iBhGB ELHc",
      ];

      // Hàm hiển thị xâu vào giao diện
      function renderStrings(targetId, arr) {
        const container = document.getElementById(targetId);
        arr.forEach((text) => {
          const div = document.createElement("div");
          div.className = "box";
          div.innerText = text;
          container.appendChild(div);
        });
      }

      // 2. Hiển thị mảng gốc
      renderStrings("original-strings", stringArray);

      // 3. Lọc các xâu có ít nhất 3 từ
      // Một từ được tính dựa trên các khoảng trắng
      const filtered = stringArray.filter(
        (str) => str.trim().split(/\s+/).length >= 3,
      );
      renderStrings("filtered-strings", filtered);

      // Thêm phần thông báo số lượng "==> Có 3 xâu..."
      const filterRow = document.getElementById("filtered-strings");
      filterRow.innerHTML += `
    <span class="text-info">==> Có</span>
    <div class="counter-box">${filtered.length}</div>
    <span class="text-info">xâu có ít nhất 3 từ</span>
`;

      // 4. Sắp xếp theo Alphabet (không phân biệt hoa thường)
      const sorted = [...stringArray].sort((a, b) =>
        a.toLowerCase().localeCompare(b.toLowerCase()),
      );
      renderStrings("sorted-strings", sorted);
    </script>
  </body>
</html>
