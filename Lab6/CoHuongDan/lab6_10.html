<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Ví dụ về xử lý vòng lặp do...while </h1>
    <script>
        var number ;
        do{
            number = prompt("Nhập 1 số bất kì , nhập 0 để thoát"); 
            document.write("Số bạn vừa nhập là " + number + "<br>")

        } while (number !=0);
        document.write("Chương trình kết thúc");  
    </script>
</body>
</html>
