<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h2 {
        color: red;
      }
    </style>
  </head>
  <body>
    <h1>Lệnh rẽ nhánh</h1>
    <script>
      var age = prompt("Nhập tuổi của bạn");
      age = parseInt(age);
      if (age < 18) {
        document.write("<h2>Bạn chưa đủ tuổi lái xe</h2>");
      } else {
        document.write("<h2>Bạn đã đủ tuổi lái xe</h2>");
      }
    </script>
  </body>
</html>
