<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Mảng trong JavaScript</h1>
    <script>
        var students = ["Huy", "Hùng", "Hạnh", "Hương"];
        document.write("Sinh viên thứ 1: " + students[0] + "<br>");
        document.write("Sinh viên thứ 2: " + students[1] + "<br>");
        document.write("<hr>");
        document.write("Danh sách sinh viên: <br>");
        for (var i = 0; i < students.length; i++) {
            document.write(students[i] + "<br>");
        }
        students.sort();
        document.write("<hr>");
        document.write("Danh sách sinh viên sau khi sắp xếp: <br>");
        for (var i = 0; i < students.length; i++) {
            document.write(students[i] + "<br>");
        }
    </script>
</body>
</html>
