<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a= prompt("Nhập số a");
        var b= prompt("Nhập số b");
        a = parseFloat(a);
        b = parseFloat(b);
        document.write("Tổng: a +b = " + (a + b) + "<br>");
        document.write("Hiệu: a - b = " + (a - b) + "<br>");
        document.write("Tích: a * b = " + (a * b) + "<br>");
        document.write("Thương: a / b = " + (a / b) + "<br>");
    </script>
</body>
</html>
