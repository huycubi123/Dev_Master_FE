<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Sử dụng các hàm alert, prompt, confirm trong JavaScript</h1>
    <script>
        var name = prompt("Nhập tên của bạn");
        alert("Xin chào " + name);
        var isConfirm = confirm("Bạn có muốn tiếp tục không?");
        if (isConfirm) {
            alert("Bạn đã chọn tiếp tục");
        } else {
            alert("Bạn đã chọn hủy");
        }
    </script>
</body>
</html>
