<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>function trong JavaScript</h1>
    <script>
        document.write("Đây là một hàm trong JavaScript");
        function Hello(name){
            document.write("Hello" + name + "<br>");
        }
        Hello("DevMaster");
        function Tong(a,b){
            return a + b;
        }
        document.write("Tổng của 5 và 10 là: " + Tong(5,10));
    </script>
</body>
</html>
