<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab04-ex9 - Phân bón vi sinh</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h2 class="title">PHÂN BÓN VI SINH</h2>
            <a href="#" class="view-all">Xem tất cả <i class="fas fa-arrow-circle-right"></i></a>
        </div>
        <div class="product-grid">
            <div class="product-card">
                <div class="image-container">
                    <img src="image.png"" alt="Sản phẩm">
                    <div class="overlay">XEM THÊM</div>
                </div>
                <div class="info">
                    <p class="product-name">Phân bón vi sinh Thành Châu (Azotobacterin)</p>
                    <div class="footer-card">
                        <span class="price"><i class="fas fa-tag"></i> Liên hệ giá</span>
                        <button class="btn-buy">Mua hàng <i class="fas fa-arrow-circle-right"></i></button>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <div class="image-container">
                    <img src="2.jpg" alt="Sản phẩm">
                    <div class="overlay">XEM THÊM</div>
                </div>
                <div class="info">
                    <p class="product-name">Sản phẩm đang cập nhật ...</p>
                    <div class="footer-card">
                        <span class="price"><i class="fas fa-tag"></i> 0.000 đ</span>
                        <button class="btn-buy">Mua hàng <i class="fas fa-arrow-circle-right"></i></button>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <div class="image-container">
                    <img src="3.jpg" alt="Sản phẩm">
                    <div class="overlay">XEM THÊM</div>
                </div>
                <div class="info">
                    <p class="product-name">Sản phẩm đang cập nhật ...</p>
                    <div class="footer-card">
                        <span class="price"><i class="fas fa-tag"></i> 0.000 đ</span>
                        <button class="btn-buy">Mua hàng <i class="fas fa-arrow-circle-right"></i></button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
