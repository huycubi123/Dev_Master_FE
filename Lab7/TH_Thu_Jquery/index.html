<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="py-3">
      <h1 class="text-center">QUẢN LÝ SINH VIÊN</h1>
    </header>

    <section class="container-fluid px-4">
      <div class="row">
        <div class="col-12 col-md-8">
          <div class="card p-3 shadow-sm">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <button class="btn btn-primary" style="background-color: #1a237e">
                Thêm mới sinh viên
              </button>

              <div class="d-flex gap-2 w-50">
                <input
                  type="search"
                  class="form-control"
                  placeholder="Search Here"
                />
                <button
                  class="btn btn-primary text-nowrap"
                  style="background-color: #1a237e"
                >
                  Tìm kiếm
                </button>
                <select class="form-select">
                  <option>Sắp xếp</option>
                </select>
              </div>
            </div>

            <h3>Danh Sách Sinh Viên</h3>
            <table class="table table-bordered align-middle text-center">
              <thead class="table-light">
                <tr>
                  <th>#</th>
                  <th>Mã sinh viên</th>
                  <th>Tên sinh viên</th>
                  <th>Tuổi</th>
                  <th>Giới tính</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody id="listData">
                <tr class="">
                  <td>1</td>
                  <td>SV001</td>
                  <td>Nguyễn Văn A</td>
                  <td>20</td>
                  <td>Nam</td>
                  <td>
                    <button class="btn btn-info btn-sm text-white">Xem</button>
                    <button class="btn btn-warning btn-sm">Sửa</button>
                    <button class="btnbtn-danger btn-sm">Xóa</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="col-12 col-md-4">
          <div class="card p-4 shadow-sm">
            <h3 class="mb-4">Thông Tin Sinh Viên</h3>
            <form id="formStudent">
              <div class="mb-3">
                <label class="form-label">Mã sinh viên</label>
                <input type="text" class="form-control" />
              </div>
              <div class="mb-3">
                <label class="form-label">Tên sinh viên</label>
                <input type="text" class="form-control" />
              </div>
              <div class="mb-3">
                <label class="form-label">Tuổi</label>
                <input type="number" class="form-control" value="0" />
              </div>
              <div class="mb-3">
                <label class="form-label">Giới tính</label>
                <input type="text" class="form-control" placeholder="Nam" />
              </div>
              <div class="mb-3">
                <label class="form-label">Ngày sinh</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="dd/mm/yyyy"
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Nơi sinh</label>
                <input type="text" class="form-control" placeholder="Hà Nội" />
              </div>
              <div class="mb-3">
                <label class="form-label">Địa chỉ</label>
                <textarea class="form-control" rows="1"></textarea>
              </div>
              <button
                type="submit"
                class="btn btn-primary w-25"
                style="background-color: #1a237e"
                id="saveBtn"
              >
                Save
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
      integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>

<script>
    var students = [
        { id: 1, code: "SV001", name: "Nguyễn Văn A", age: 20, gender: "Nam", birthday: "01/01/2002", birthplace: "Hà Nam", address: "Hà Nam" },
        { id: 2, code: "SV002", name: "Trần Thị B", age: 22, gender: "Nữ", birthday: "01/01/2000", birthplace: "Hà Nội", address: "Hà Nội" }
    ];

    const loadData = () => {
        let html = "";
        students.forEach((student, index) => {
            html += `
                <tr>
                    <td>${student.id}</td>
                    <td>${student.code}</td>
                    <td>${student.name}</td>
                    <td>${student.age}</td>
                    <td>${student.gender}</td>
                    <td>
                        <button data-id="${student.id}" class="btn btn-info btn-sm text-white btn-view">Xem</button>
                        <button data-id="${student.id}" class="btn btn-warning btn-sm btn-edit">Sửa</button>
                        <button data-id="${student.id}" class="btn btn-danger btn-sm btn-delete">Xóa</button>
                    </td>
                </tr>`;
        });
        $("#listData").html(html);
    };

    loadData();

    // Biến dùng chung để biết đang sửa sinh viên nào
    var currentEditId = null;

    $(document).ready(function () {
        // XỬ LÝ XEM
        $(document).on("click", ".btn-view", function () {
            var idStudent = $(this).attr("data-id");
            var student = students.find((s) => s.id == idStudent);
            if (student) {
                fillForm(student);
                // KHÓA FORM
                $("#formStudent input, #formStudent textarea, #saveBtn").prop("disabled", true);
            }
        });

        // XỬ LÝ SỬA
        $(document).on("click", ".btn-edit", function () {
            var idStudent = $(this).attr("data-id");
            var student = students.find((s) => s.id == idStudent);
            if (student) {
                currentEditId = idStudent; // Lưu ID đang sửa vào biến dùng chung
                fillForm(student);
                // QUAN TRỌNG: MỞ KHÓA FORM KHI SỬA
                $("#formStudent input, #formStudent textarea, #saveBtn").prop("disabled", false);
            }
        });

        // XỬ LÝ NÚT LƯU (Đưa ra ngoài, không lồng vào nút Sửa nữa)
        $("#saveBtn").click(function (event) {
            event.preventDefault();
            
            if (currentEditId) {
                // Logic SỬA: Tìm sinh viên cũ và cập nhật
                var student = students.find((s) => s.id == currentEditId);
                if (student) {
                    student.code = $("#formStudent input").eq(0).val();
                    student.name = $("#formStudent input").eq(1).val();
                    student.age = $("#formStudent input").eq(2).val();
                    student.gender = $("#formStudent input").eq(3).val();
                    student.birthday = $("#formStudent input").eq(4).val();
                    student.birthplace = $("#formStudent input").eq(5).val();
                    student.address = $("#formStudent textarea").eq(0).val();
                }
                currentEditId = null; // Reset lại sau khi sửa xong
            } else {
                // Logic THÊM MỚI (nếu không có currentEditId)
                var newStudent = {
                    id: students.length + 1,
                    code: $("#formStudent input").eq(0).val(),
                    name: $("#formStudent input").eq(1).val(),
                    age: parseInt($("#formStudent input").eq(2).val()),
                    gender: $("#formStudent input").eq(3).val(),
                    birthday: $("#formStudent input").eq(4).val(),
                    birthplace: $("#formStudent input").eq(5).val(),
                    address: $("#formStudent textarea").eq(0).val(),
                };
                students.push(newStudent);
            }
            
            loadData(); // Vẽ lại bảng
            $("#formStudent")[0].reset(); // Xóa trắng form
        });

        // XỬ LÝ XÓA
        $(document).on("click", ".btn-delete", function () {
            var idStudent = $(this).attr("data-id");
            students = students.filter(s => s.id != idStudent);
            loadData();
        });

        // Hàm bổ trợ để đổ dữ liệu vào Form
        function fillForm(student) {
            $("#formStudent input").eq(0).val(student.code);
            $("#formStudent input").eq(1).val(student.name);
            $("#formStudent input").eq(2).val(student.age);
            $("#formStudent input").eq(3).val(student.gender);
            $("#formStudent input").eq(4).val(student.birthday);
            $("#formStudent input").eq(5).val(student.birthplace);
            $("#formStudent textarea").eq(0).val(student.address);
        }
    });
    // khi click thêm nút thêm sinh viên thì reset lại form và mở khóa form
</script>
  </body>
</html>
